{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ai Recruiter - Create Business Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      .gradient-text {
        background: linear-gradient(to right, #2563eb, #06b6d4, #10b981);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .gradient-bg {
        background: linear-gradient(to bottom right, #2563eb, #06b6d4, #10b981);
      }
      input:focus,
      select:focus {
        border-color: #06b6d4;
        ring: 4px;
        ring-color: rgba(6, 182, 212, 0.1);
      }
    </style>
  </head>
  <body class="bg-slate-50 font-sans text-slate-900 min-h-screen">
    <!-- Aesthetic Header for Register -->
    <nav
      class="w-full bg-white/80 backdrop-blur-md border-b border-slate-100 py-3 px-8 flex justify-between items-center fixed top-0 z-50"
    >
      <a href="{% url 'home' %}" class="flex items-center gap-3 group">
        <!-- Logo size decreased to w-12 h-12 -->
        <div
          class="w-12 h-12 group-hover:scale-110 transition-transform flex items-center justify-center"
        >
          <img
            src="{% static 'images/logo.svg' %}"
            alt="Logo"
            class="w-full h-full object-contain"
            onerror="
              this.src =
                'https://via.placeholder.com/48x48/2563eb/ffffff?text=AR'
            "
          />
        </div>
        <!-- Brand text decreased to text-2xl for balance -->
        <span
          class="text-2xl font-black gradient-text tracking-tighter uppercase leading-none"
          >Ai Recruiter</span
        >
      </a>
      <div class="flex items-center gap-4">
        <span
          class="hidden sm:inline text-sm font-medium text-slate-400 uppercase tracking-widest"
          >Already a member?</span
        >
        <a
          href="{% url 'login' %}"
          class="secondary-btn px-6 py-2.5 rounded-full border border-slate-200 text-sm font-bold text-slate-700 shadow-sm flex items-center gap-2 hover:border-cyan-400 hover:text-cyan-600"
        >
          Login <i class="fas fa-arrow-right text-[10px]"></i>
        </a>
      </div>
    </nav>

    <div class="flex items-center justify-center pt-32 pb-20 px-4">
      <div
        class="max-w-5xl w-full bg-white rounded-[48px] shadow-2xl overflow-hidden border border-slate-100 flex flex-col md:flex-row"
      >
        <!-- Sidebar Branding -->
        <div
          class="md:w-1/2 gradient-bg p-12 text-white flex flex-col justify-center relative"
        >
 
          <div class="relative z-10">
            <div
              class="w-20 h-20 bg-white/20 backdrop-blur-md rounded-3xl flex items-center justify-center mb-8 shadow-xl"
            >
              <i class="fas fa-rocket text-4xl"></i>
            </div>
            <h2 class="text-2xl font-black mb-6 leading-tight">
              Scale Your Hiring with AI
            </h2>
            <p class="text-white/80 text-lg ">
              Join modern teams hiring faster and smarter with advanced AI
              tools.
            </p>
          </div>
        </div>

        <!-- Multi-field Form -->
        <div class="md:w-2/3 p-12">
          <h1 class="text-3xl font-black text-slate-900 mb-2">
            Create Account
          </h1>

          <form method="POST" class="space-y-6">
            {% csrf_token %}

            <div class="grid md:grid-cols-2 gap-6">
              <div>
                <label
                  class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1"
                >
                  First Name
                </label>
                <input
                  type="text"
                  name="first_name"
                  required
                  class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl text-sm outline-none focus:bg-white transition-all"
                  placeholder="John"
                />
              </div>

              <div>
                <label
                  class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1"
                >
                  Last Name
                </label>
                <input
                  type="text"
                  name="last_name"
                  required
                  class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl text-sm outline-none focus:bg-white transition-all"
                  placeholder="Doe"
                />
              </div>
            </div>

            <div>
              <label
                class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1"
              >
                Work Email
              </label>
              <input
                type="email"
                name="email"
                required
                class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl text-sm outline-none focus:bg-white transition-all"
                placeholder="john@company.com"
              />
            </div>

            <div class="grid md:grid-cols-2 gap-6">
              <div>
                <label
                  class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1"
                >
                  Password
                </label>
                <input
                  type="password"
                  name="password"
                  required
                  class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl text-sm outline-none focus:bg-white transition-all"
                />
              </div>

              <div>
                <label
                  class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1"
                >
                  Confirm Password
                </label>
                <input
                  type="password"
                  name="confirm_password"
                  required
                  class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl text-sm outline-none focus:bg-white transition-all"
                />
              </div>
            </div>

            <div class="flex items-center gap-3 py-3 px-1">
              <input
                type="checkbox"
                required
                class="w-5 h-5 rounded-lg text-blue-600 border-slate-200"
              />
              <label class="text-xs text-slate-500 font-medium">
                I agree to Terms & Privacy Policy
              </label>
            </div>

            <button
              type="submit"
              class="w-full py-5 rounded-2xl bg-gradient-to-r from-blue-600 to-cyan-500 text-white font-black text-xl shadow-xl hover:scale-[1.02] active:scale-95 transition-all mt-4"
            >
              Signup
            </button>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
