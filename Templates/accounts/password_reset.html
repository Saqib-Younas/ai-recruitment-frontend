{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ai Recruiter - Reset Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .gradient-text { background: linear-gradient(to right, #2563eb, #06b6d4, #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .gradient-bg { background: linear-gradient(to bottom right, #2563eb, #06b6d4, #10b981); }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="max-w-md w-full">
        <!-- Logo and Brand -->
        <div class="flex items-center justify-center gap-3 mb-10">
            <div class="w-12 h-12 rounded-xl gradient-bg flex items-center justify-center text-white shadow-xl">
                <i class="fas fa-bolt text-2xl"></i>
            </div>
            <span class="text-3xl font-bold gradient-text">Ai Recruiter</span>
        </div>

        <div class="bg-white p-10 rounded-[32px] shadow-2xl border border-slate-100 relative overflow-hidden">
            <!-- Background Decoration -->
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-blue-50 rounded-full blur-3xl opacity-50"></div>
            
            <div class="relative z-10">
                <h1 class="text-2xl font-black text-slate-900 mb-2">Forgot Password?</h1>
                <p class="text-slate-500 text-sm mb-8">Enter your email address below and we'll send you a link to reset your password.</p>

                <form method="POST" class="space-y-6">
                    {% csrf_token %}
                    <div class="space-y-2">
                        <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Email Address</label>
                        <input type="email" name="email" autocomplete="email" required 
                               class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl text-sm focus:bg-white focus:ring-4 focus:ring-blue-50 outline-none transition-all" 
                               placeholder="john@company.com">
                    </div>

                    <button type="submit" class="w-full py-4 rounded-2xl gradient-bg text-white font-black text-lg shadow-xl shadow-cyan-100 hover:scale-[1.02] active:scale-95 transition-all">
                        Send Reset Link
                    </button>
                </form>

                <div class="mt-8 pt-6 border-t border-slate-50 text-center">
                    <p class="text-sm text-slate-500">Wait, I remember it! <a href="{% url 'login' %}" class="text-blue-600 font-bold hover:underline">Back to Login</a></p>
                </div>
            </div>
        </div>
        
        <p class="mt-8 text-center text-xs text-slate-400 font-medium uppercase tracking-widest">© 2026 Ai Recruiter Secure Hub</p>
    </div>

</body>
</html>
