{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ai Recruiter - Password Changed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .gradient-text { background: linear-gradient(to right, #2563eb, #06b6d4, #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .gradient-bg { background: linear-gradient(to bottom right, #2563eb, #06b6d4, #10b981); }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="max-w-md w-full text-center">
        <!-- Logo -->
        <div class="flex items-center justify-center gap-3 mb-10">
            <div class="w-12 h-12 rounded-xl gradient-bg flex items-center justify-center text-white shadow-xl">
                <i class="fas fa-bolt text-2xl"></i>
            </div>
            <span class="text-3xl font-bold gradient-text uppercase tracking-tighter">Ai Recruiter</span>
        </div>

        <div class="bg-white p-12 rounded-[40px] shadow-2xl border border-slate-100 relative overflow-hidden">
            <!-- Background Glow -->
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-cyan-50 rounded-full blur-3xl opacity-50"></div>
            
            <div class="relative z-10">
                <!-- Success Checkmark -->
                <div class="w-20 h-20 bg-emerald-50 text-emerald-500 rounded-full flex items-center justify-center mx-auto mb-8 shadow-inner">
                    <i class="fas fa-check-circle text-4xl"></i>
                </div>

                <h1 class="text-3xl font-black text-slate-900 mb-4 tracking-tight">Password Updated!</h1>
                <p class="text-slate-500 leading-relaxed mb-10">
                    Your password has been successfully reset. You can now use your new password to log in to your account.
                </p>

                <a href="{% url 'login' %}" class="block w-full py-4 rounded-2xl bg-slate-900 text-white font-black text-lg shadow-xl hover:bg-slate-800 transition-all hover:scale-[1.02] active:scale-95">
                    Log In Now
                </a>
            </div>
        </div>
        
        <p class="mt-8 text-xs text-slate-400 font-bold uppercase tracking-[0.2em]">Secure Authentication System</p>
    </div>

</body>
</html>
