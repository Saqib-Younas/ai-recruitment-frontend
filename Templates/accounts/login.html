<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ai Recruiter - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .gradient-text { background: linear-gradient(to right, #2563eb, #06b6d4, #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .gradient-bg { background: linear-gradient(to bottom right, #2563eb, #06b6d4, #10b981); }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="max-w-md w-full">
        <!-- Updated Logo and Name -->
        <div class="flex items-center justify-center gap-3 mb-10">
            <div class="w-12 h-12 rounded-xl gradient-bg flex items-center justify-center text-white shadow-xl">
                <i class="fas fa-bolt text-2xl"></i>
            </div>
            <span class="text-3xl font-bold gradient-text">Ai Recruiter</span>
        </div>

        <div class="bg-white p-10 rounded-3xl shadow-2xl border border-slate-100">
            <h1 class="text-2xl font-bold mb-2">Welcome Back</h1>
            <p class="text-slate-500 text-sm mb-8">Login to manage your hiring process.</p>

            <form method="POST" class="space-y-6">
                {% csrf_token %}
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Email Address</label>
                    <input type="email" name="username" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl text-sm" placeholder="john@company.com">
                </div>
                
                <div>
                    <div class="flex justify-between mb-1">
                        <label class="block text-xs font-bold uppercase text-slate-500">Password</label>
                        <a href="{% url 'password_reset' %}" class="text-xs font-bold text-blue-600 hover:underline">Forgot Password?</a>
                    </div>
                    <input type="password" name="password" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl text-sm" placeholder="••••••••">
                </div>

                <button type="submit" class="w-full py-4 rounded-xl gradient-bg text-white font-bold text-lg shadow-lg">Login</button>
            </form>

            <div class="mt-8 pt-6 border-t border-slate-100 text-center">
                <p class="text-sm text-slate-500">Don't have an account? <a href="{% url 'register' %}" class="text-blue-600 font-bold hover:underline">Create Account</a></p>
            </div>
        </div>
        
        <p class="mt-8 text-center text-xs text-slate-400">© 2026 Ai Recruiter Secure Systems</p>
    </div>

</body>
</html>
